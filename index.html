<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeoBuzz — AI Trip Planner</title>
  </head>
  <body>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML += '<div style="color:white; z-index:9999; position:absolute; top:20px; left:20px; right:20px; background:red; padding:20px; border:4px solid darkred; font-family:monospace; font-weight:bold; font-size:18px;">CRASH: ' + e.message + '</div>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML += '<div style="color:white; z-index:9999; position:absolute; top:20px; left:20px; right:20px; background:red; padding:20px; border:4px solid darkred; font-family:monospace; font-weight:bold; font-size:18px;">PROMISE CRASH: ' + e.reason + '</div>';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
